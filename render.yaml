# Render Blueprint — CredenceAI API + Celery worker
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploy:
# 1. Create Neon Postgres → set DATABASE_URL in Render dashboard
# 2. Create Upstash Redis → set REDIS_URL in Render dashboard
# 3. Set OAuth, JWT, and CORS env vars (see backend/.env.production.example)

services:
  - type: web
    name: credenceai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: MOCK_SERVICES
        value: "false"
      - key: CELERY_ALWAYS_EAGER
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ENABLE_API_KEY_AUTH
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://credence-ai-patilniraj413-5474s-projects.vercel.app/auth/google/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: '["https://credence-ai-patilniraj413-5474s-projects.vercel.app","https://credence-ai-gamma.vercel.app"]'

  - type: worker
    name: credenceai-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: celery -A app.worker worker --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: MOCK_SERVICES
        value: "false"
      - key: CELERY_ALWAYS_EAGER
        value: "false"
      - key: DATABASE_URL
        fromService:
          name: credenceai-api
          type: web
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          name: credenceai-api
          type: web
          envVarKey: REDIS_URL
