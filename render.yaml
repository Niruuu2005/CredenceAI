# Render Blueprint — CredenceAI API + Celery worker
# Docs: https://render.com/docs/blueprint-spec
# Setup guide: docs/manual-setup.md
#
# Before deploy:
# 1. Create Neon Postgres → set DATABASE_URL in Render dashboard
# 2. Create Upstash Redis → set REDIS_URL in Render dashboard
# 3. Update FRONTEND URLs below if your Vercel app URL changes
# 4. Set OAuth secrets in Render dashboard (see docs/oauth-setup.md)
#
# Canonical frontend: https://credence-ai-gamma.vercel.app

services:
  - type: web
    name: credenceai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # --- Core ---
      - key: APP_ENV
        value: production
      - key: MOCK_SERVICES
        value: "false"
      - key: CELERY_ALWAYS_EAGER
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ENABLE_API_KEY_AUTH
        value: "true"

      # --- Secrets (set in Render dashboard; sync: false) ---
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # --- Frontend / OAuth (canonical: gamma) ---
      - key: GOOGLE_REDIRECT_URI
        value: https://credence-ai-gamma.vercel.app/auth/google/callback
      - key: GITHUB_REDIRECT_URI
        value: https://credence-ai-gamma.vercel.app/auth/github/callback
      - key: CORS_ALLOWED_ORIGINS
        value: '["https://credence-ai-gamma.vercel.app","https://credence-ai-patilniraj413-5474s-projects.vercel.app"]'

      # --- Render free-tier: self-ping /api/health every 30s ---
      - key: SELF_KEEPALIVE_ENABLED
        value: "true"
      - key: SELF_KEEPALIVE_INTERVAL_SEC
        value: "30"
      - key: API_PUBLIC_URL
        value: https://credenceai-api.onrender.com

  - type: worker
    name: credenceai-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: celery -A app.worker worker --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: MOCK_SERVICES
        value: "false"
      - key: CELERY_ALWAYS_EAGER
        value: "false"
      - key: SELF_KEEPALIVE_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromService:
          name: credenceai-api
          type: web
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          name: credenceai-api
          type: web
          envVarKey: REDIS_URL
